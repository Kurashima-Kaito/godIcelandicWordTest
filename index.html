<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
  <title>アイスランド語 活用クイズ</title>
  <style>
    /* 全体設定：スマホの誤作動やスクロールを防ぐ */
    * {
      box-sizing: border-box;
      -webkit-tap-highlight-color: transparent;
    }
    
    body {
      margin: 0;
      padding: 0;
      overflow: hidden;
      background-color: #141414;
      color: #FFFFFF;
      font-family: 'CustomFont', -apple-system, BlinkMacSystemFont, sans-serif;
      display: flex;
      justify-content: center;
      align-items: center;
      height: 100vh;
      font-size: 16px;
    }

    /* アプリ全体のコンテナ（アスペクト比を維持しつつ画面に収める） */
    #appContainer {
      width: 100vw;
      max-width: 500px;
      height: 100vh;
      max-height: 700px;
      position: relative;
      display: flex;
      flex-direction: column;
      padding: 20px;
      justify-content: space-between;
    }

    /* フェーズ（画面）ごとの切り替え制御 */
    .phase {
      display: none;
      flex-direction: column;
      height: 100%;
      width: 100%;
    }
    .phase.active {
      display: flex;
    }

    /* --- タイトル画面のスタイル --- */
    #titlePhase {
      justify-content: center;
      align-items: center;
      text-align: justify;
    }
    .title-text {
      font-size: 2.5rem;
      font-weight: bold;
      line-height: 1.2;
      margin-bottom: 3rem;
      letter-spacing: 2px;
      white-space: pre-line;
    }

    /* --- ゲーム画面のスタイル --- */
    #gamePhase {
      justify-content: flex-start;
      align-items: center;
    }

    .top-menu {
      width: 100%;
      display: flex;
      justify-content: flex-start;
      gap: 10px;
      margin-bottom: 20px;
    }

    .header-title {
      font-size: 2rem;
      margin: 0 0 10px 0;
      text-align: center;
    }

    .question-info {
      font-size: 1.8rem;
      text-align: center;
      margin-bottom: 10px;
    }

    .question-case {
      font-size: 1.8rem;
      color: #E6A23C;
      text-align: center;
      margin-bottom: 20px;
    }

    /* 履歴表示エリア */
    .history-box {
      width: 100%;
      background: #202020;
      padding: 15px;
      border-radius: 8px;
      margin-bottom: 20px;
      font-size: 1.2rem;
      line-height: 1.6;
    }
    .status-correct { color: #96E77F; font-weight: bold; }
    .status-wrong { color: #E77F7F; font-weight: bold; }

    /* 画像表示オーバーレイ */
    #imageDisplay {
      width: 100%;
      height: 200px;
      background: #1a1a1a;
      border: 1px dashed #404040;
      border-radius: 8px;
      display: flex;
      justify-content: center;
      align-items: center;
      margin-bottom: 20px;
      overflow: hidden;
    }
    #imageDisplay img {
      max-width: 100%;
      max-height: 100%;
      object-fit: contain;
    }

    /* 入力エリア */
    #answerInput {
      width: 100%;
      height: 80px;
      background-color: #404040;
      color: #FFFFFF;
      font-size: 1.8rem;
      padding: 10px;
      border: 2px solid #646464;
      border-radius: 8px;
      outline: none;
      resize: none;
      -webkit-appearance: none;
    }

    /* --- 共通ボタンスタイル --- */
    .btn {
      background: #282828;
      color: #FFFFFF;
      border: 4px solid #646464;
      padding: 12px 24px;
      font-size: 1.2rem;
      font-weight: bold;
      cursor: pointer;
      border-radius: 4px;
      transition: background 0.1s;
      text-align: center;
    }
    .btn:active {
      background: #505050;
    }
    .btn-large {
      width: 80%;
      font-size: 1.5rem;
      padding: 15px;
    }
    .btn-small {
      padding: 6px 12px;
      font-size: 0.9rem;
      border-width: 2px;
    }
  </style>
</head>
<body>

<div id="appContainer">
  <div id="titlePhase" class="phase active">
    <div class="title-text">Apprenons<br>françaises<br>conjugaisons.</div>
    <button class="btn btn-large" id="startBtn">Commence</button>
  </div>

  <div id="gamePhase" class="phase">
    <div class="top-menu">
      <button class="btn btn-small" id="btnBending">Bending</button>
      <button class="btn btn-small" id="btnImage14">Hint</button>
    </div>

    <h2 class="header-title">Qui est-ce</h2>
    <div class="question-info" id="qInfo">--</div>
    <div class="question-case" id="qCase">-- 既知形 ?</div>

    <div id="imageDisplay">
      <span style="color: #646464;">[ 画像表示エリア ]</span>
    </div>

    <div class="history-box">
      <div>La Solution: <span id="hSolution">-</span></div>
      <div>La Réponse: <span id="hResponse">-</span></div>
      <div>La Situation: <span id="hSituation">-</span></div>
    </div>

    <textarea id="answerInput" placeholder="答えを入力して改行..." autocomplete="off" autocorrect="off" autocapitalize="off" spellcheck="false"></textarea>
  </div>
</div>

<script>
// --- グローバル変数 ---
let currentQues;
let currentGender = 0;
let caseRand = 1;
let prevAnswer = "", prevUserAnswer = "";
let images = [];

let MNouns = [];
let NNouns = [];
let FNouns = [];

const casesName = ["単数主格", "単数対格", "単数与格", "単数属格", "複数主格", "複数対格", "複数与格", "複数属格"];
const MArticles = ["inn", "inn", "num", "ins",   "nir", "na",  "num", "nna"];
const NArticles = ["ið",  "ið",  "inn", "ins",   "in",  "in",  "num", "nna"];
const FArticles = ["in",  "ina", "inni","innar", "nar", "nar", "num", "nna"];
const vowels = ["a", "e", "i", "y", "o", "ö", "æ", "u", "á", "é", "í", "ý", "ó", "ú"];

// DOM要素の取得
const titlePhase = document.getElementById('titlePhase');
const gamePhase = document.getElementById('gamePhase');
const startBtn = document.getElementById('startBtn');
const answerInput = document.getElementById('answerInput');
const qInfo = document.getElementById('qInfo');
const qCase = document.getElementById('qCase');
const hSolution = document.getElementById('hSolution');
const hResponse = document.getElementById('hResponse');
const hSituation = document.getElementById('hSituation');
const imageDisplay = document.getElementById('imageDisplay');
const btnBending = document.getElementById('btnBending');
const btnImage14 = document.getElementById('btnImage14');

// --- データの読み込み関数 ---
async function loadStrings(url) {
  const res = await fetch(url);
  if (!res.ok) return [];
  const text = await res.text();
  return text.split('\n').map(line => line.trim()).filter(line => line.length > 0);
}

function preloadImage(url) {
  return new Promise((resolve) => {
    const img = new Image();
    img.onload = () => resolve(img);
    img.onerror = () => resolve(null);
    img.src = url;
  });
}

// --- 初期化処理 ---
async function setup() {
  // 自作フォントの適用
  try {
    const font = new FontFace('CustomFont', 'url(SemiBold.ttf)');
    await font.load();
    document.fonts.add(font);
  } catch (e) {
    console.warn("カスタムフォントが読み込めませんでした。標準フォントを使用します。");
  }

  // テキストデータのロードとパース（バグ修正版）
  try {
    let MNounsTemp = await loadStrings("MNouns.txt");
    MNouns = MNounsTemp.map(line => {
      let MN = line.split(" ");
      return [MN[0], MN[1], MN[2], MN[3], MN[4], MN[5], MN[6], MN[7], MN[8], parseInt(MN[9])];
    });

    let NNounsTemp = await loadStrings("NNouns.txt");
    NNouns = NNounsTemp.map(line => {
      let NN = line.split(" ");
      return [NN[0], NN[1], NN[2], NN[3], NN[4], NN[5], NN[6], NN[7], NN[8], parseInt(NN[9])];
    });

    let FNounsTemp = await loadStrings("FNouns.txt");
    FNouns = FNounsTemp.map(line => {
      let FN = line.split(" ");
      return [FN[0], FN[1], FN[2], FN[3], FN[4], FN[5], FN[6], FN[7], FN[8], parseInt(FN[9])];
    });
  } catch (e) {
    console.error("データの読み込みエラー:", e);
  }

  // 画像をあらかじめURLの文字列配列として準備（HTML要素で直接切り替えるため最適化）
  for (let i = 1; i <= 14; i++) {
    images.push(i + ".webp");
  }

  setupEventListeners();
}

// --- イベントリスナー設定 ---
function setupEventListeners() {
  // スタートボタン
  startBtn.addEventListener('click', () => {
    titlePhase.classList.remove('active');
    gamePhase.classList.add('active');
    nextQues();
    answerInput.focus();
  });

  // 解答入力監視
  answerInput.addEventListener('input', () => {
    if (answerInput.value.indexOf("\n") !== -1) {
      checkAnswer();
    }
  });

  // ボタン：現在の問題の画像を表示
  btnBending.addEventListener('click', () => {
    if (!currentQues) return;
    let imgIdx = currentQues[9] - 1;
    showImage(images[imgIdx]);
  });

  // ボタン：14枚目の画像（共通ヒント等）を表示
  btnImage14.addEventListener('click', () => {
    showImage(images[13]);
  });
}

// --- クイズ制御ロジック ---
function nextQues() {
  currentGender = Math.floor(Math.random() * 3);

  switch (currentGender) {
    case 0:
      if (MNouns.length > 0) currentQues = MNouns[Math.floor(Math.random() * MNouns.length)];
      break;
    case 1:
      if (FNouns.length > 0) currentQues = FNouns[Math.floor(Math.random() * FNouns.length)];
      break;
    case 2:
      if (NNouns.length > 0) currentQues = NNouns[Math.floor(Math.random() * NNouns.length)];
      break;
  }
  caseRand = Math.floor(Math.random() * 7) + 1;

  // 画面表示の更新
  if (currentQues) {
    let genderStr = currentGender === 0 ? "kk" : (currentGender === 1 ? "kvk" : "hk");
    let typeStr = currentQues[0] === "weak" ? "vb " : "sb ";
    qInfo.textContent = `${genderStr}${typeStr}${currentQues[1]} -s`;
    qCase.textContent = `${casesName[caseRand]} 既知形 ?`;
  }
  
  // 画像表示エリアのリセット
  imageDisplay.innerHTML = `<span style="color: #404040;">[ 画像表示エリア ]</span>`;
}

function checkAnswer() {
  let inputStr = answerInput.value.toLowerCase().replaceAll("\n", "");
  let articles = [];

  switch (currentGender) {
    case 0: articles = MArticles; break;
    case 1: articles = FArticles; break;
    case 2: articles = NArticles; break;
  }

  if (currentQues) {
    prevAnswer = currentQues[caseRand + 1];

    let isSyncope = false;
    if (vowels.includes(prevAnswer[prevAnswer.length - 1])) {
      if (vowels.includes(articles[caseRand][0])) {
        isSyncope = true;
      }
    }

    if (isSyncope) {
      prevAnswer += articles[caseRand].slice(1);
    } else {
      if (caseRand === 6) {
        prevAnswer = prevAnswer.slice(0, prevAnswer.length - 1) + articles[caseRand];
      } else {
        prevAnswer += articles[caseRand];
      }
    }

    prevUserAnswer = inputStr;

    // 履歴（DOM）の更新
    hSolution.textContent = prevAnswer;
    hResponse.textContent = prevUserAnswer;

    // 正誤判定文言と色のバグ修正
    if (prevAnswer === prevUserAnswer) {
      hSituation.textContent = "Correct";
      hSituation.className = "status-correct";
    } else {
      hSituation.textContent = "Mauvais";
      hSituation.className = "status-wrong";
    }

    nextQues();
  }

  answerInput.value = "";
  answerInput.blur(); // 入力終了時にスマホのキーボードを一度閉じる
}

function showImage(src) {
  if (!src) return;
  imageDisplay.innerHTML = `<img src="${src}" alt="Hint Image">`;
}

// アプリの起動
window.onload = setup;
</script>
</body>
</html>
